name: Code Formatting Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies JavaScript
        run: |
          cd frontend
          npm ci
      
      - name: Check formatting with Prettier JavaScript
        run: |
          cd frontend
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,json}"

      - name: Check pytests Python
        run: |
          cd backend
          pytest tests/