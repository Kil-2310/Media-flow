server {
	listen 443 ssl http2;
	server_name test-domain-my.ru;  # Замените на ваш домен

	# Пути к SSL-сертификатам
	ssl_certificate /etc/nginx/ssl/fullchain.pem;
	ssl_certificate_key /etc/nginx/ssl/privkey.pem;

	# Настройки SSL
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;

	client_max_body_size 100M;

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log debug;

	# Основные заголовки безопасности
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header X-XSS-Protection "1; mode=block" always;

	location /api/ {
        proxy_pass http://backend:8000/api/;

        proxy_set_header Host $host;
        # Для защиты IP клиента
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_pass_header Set-Cookie;
        proxy_set_header Cookie $http_cookie;

        proxy_cookie_domain ~^.*$ test-domain-my.ru;
        # ИСПРАВИТЬ: SameSite=None (а не Lax)
        proxy_cookie_path / "/; Secure; SameSite=None";

        proxy_buffering off;
        proxy_cache off;

	proxy_connect_timeout 60s;
	proxy_send_timeout 60s;
	proxy_read_timeout 60s;
	}

	location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cookie_domain ~^.*$ test-domain-my.ru;
	}

	location /openapi.json {
	    proxy_pass http://backend:8000/openapi.json;
	    proxy_set_header Host $host;
	    proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /profiler/ {
        proxy_pass http://backend:8000/profiler/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cookie_domain ~^.*$ test-domain-my.ru;
	}
}
