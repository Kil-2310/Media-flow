<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Код подтверждения</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 500px; margin: 0 auto; background: white; border-radius: 10px;">
        <tr>
            <td style="padding: 30px;">
                <h2 style="margin: 0 0 15px 0; color: #333;">Ваш код подтверждения</h2>
                <p style="margin: 0 0 20px 0; color: #666; font-size: 16px;">
                    Используйте этот код для подтверждения действия:
                </p>
                <div style="background: #f0f0f0; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px;">
                    <span style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #333;">{}</span>
                </div>
                <p style="margin: 0 0 10px 0; color: #999; font-size: 14px;">
                    Код действителен в течение 15 минут.
                </p>
                <p style="margin: 0; color: #999; font-size: 12px;">
                    Если вы не запрашивали этот код, просто проигнорируйте это письмо.
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
