version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    networks:
      - app_network

  backend:
    build: .
    ports:
      - "8000"
    depends_on:
      - redis
    networks:
      - app_network
  worker:
    build: .
    command: celery -A app.celery.celery_app worker --loglevel=info
    depends_on:
      - redis
    networks:
      - app_network

networks:
  app_network:
    driver: bridge