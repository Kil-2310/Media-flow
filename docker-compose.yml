services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=mediaflow
    ports:
      - '5433:5432'
    volumes:
      - ./db/:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    networks:
      - app_network

  backend:
    build: ./backend
    ports:
      - "8000"
    networks:
      - app_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - app_network

  worker:
    build: backend
    command: celery -A app.celery.celery_app worker --loglevel=info
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
