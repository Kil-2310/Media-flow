services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    networks:
      - app_network

  backend:
    build: ./backend
    ports:
      - "8000"
    networks:
      - app_network
    environment:
      - HOST=${HOST}
    env_file:
      - ./.env

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - app_network

  worker:
    build: backend
    command: celery -A app.celery.celery_app worker --loglevel=info
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
